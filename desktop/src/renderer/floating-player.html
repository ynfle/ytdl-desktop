<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #08080a;
        --surface: #0f0f13;
        --surface-raised: #16161c;
        --border: rgba(255, 255, 255, 0.06);
        --border-bright: rgba(255, 255, 255, 0.12);
        --text: #ede9e3;
        --text-secondary: #9e9690;
        --text-muted: #5c5650;
        --accent: #e8a849;
        --accent-hover: #f0bd60;
        --accent-glow: rgba(232, 168, 73, 0.15);
      }

      * { box-sizing: border-box; margin: 0; }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      ::selection {
        background: rgba(232, 168, 73, 0.25);
        color: var(--text);
      }

      .video-wrap {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        position: relative;
      }

      /* Episode / show artwork when the file is audio-only (no decoded video plane). */
      #art {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        bottom: 0;
        margin: auto;
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
        display: none;
        pointer-events: none;
      }

      video {
        width: 100%;
        height: 100%;
        max-height: 100%;
        object-fit: contain;
      }

      video.floating-audio-only {
        opacity: 0;
      }

      /* ── Controls chrome ── */
      .controls {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        background: linear-gradient(180deg, rgba(15, 15, 19, 0.85) 0%, rgba(8, 8, 10, 0.95) 100%);
        backdrop-filter: blur(20px) saturate(1.4);
        -webkit-backdrop-filter: blur(20px) saturate(1.4);
        border-top: 1px solid var(--border);
      }

      /* ── Timeline ── */
      .timeline-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px 4px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 10px;
        font-variant-numeric: tabular-nums;
        color: var(--text-muted);
      }
      .timeline-row span.time {
        flex: 0 0 auto;
        min-width: 2.75rem;
        text-align: center;
      }
      .timeline-row span.time:first-child {
        text-align: right;
      }
      .timeline-row span.time:last-child {
        text-align: left;
      }

      #timeline {
        flex: 1;
        min-width: 0;
        height: 4px;
        margin: 0;
        padding: 0;
        cursor: pointer;
        -webkit-appearance: none;
        appearance: none;
        background: var(--border-bright);
        border-radius: 9999px;
        outline: none;
        transition: height 120ms ease;
      }
      #timeline:hover {
        height: 6px;
      }
      #timeline::-webkit-slider-runnable-track {
        height: 100%;
        border-radius: 9999px;
        background: transparent;
      }
      #timeline::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        margin-top: -5px;
        border-radius: 50%;
        background: var(--accent);
        border: 2px solid var(--bg);
        box-shadow: 0 0 0 2px rgba(232, 168, 73, 0.25), 0 2px 6px rgba(0, 0, 0, 0.4);
        cursor: pointer;
        transition: transform 150ms ease, box-shadow 150ms ease;
      }
      #timeline::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        box-shadow: 0 0 0 3px rgba(232, 168, 73, 0.3), 0 2px 8px rgba(0, 0, 0, 0.5);
      }
      #timeline::-moz-range-track {
        height: 4px;
        border-radius: 9999px;
        background: var(--border-bright);
        border: none;
      }
      #timeline::-moz-range-progress {
        height: 4px;
        border-radius: 9999px;
        background: var(--accent);
      }
      #timeline::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--accent);
        border: 2px solid var(--bg);
        box-shadow: 0 0 0 2px rgba(232, 168, 73, 0.25), 0 2px 6px rgba(0, 0, 0, 0.4);
      }
      #timeline:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }

      /* ── Buttons bar ── */
      .bar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 6px 14px 12px;
      }

      button {
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        font-size: 12px;
        font-weight: 500;
        padding: 7px 16px;
        border-radius: 8px;
        border: 1px solid var(--border-bright);
        background: var(--surface-raised);
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 150ms ease;
        letter-spacing: 0.01em;
      }
      button:hover {
        background: var(--surface-raised);
        border-color: rgba(255, 255, 255, 0.16);
        color: var(--text);
      }
      button:active {
        transform: scale(0.97);
      }

      /* Play button accent style */
      #bPlay {
        background: linear-gradient(135deg, #e8a849 0%, #d4893a 100%);
        border: none;
        color: var(--bg);
        font-weight: 600;
        padding: 7px 22px;
        box-shadow: 0 2px 10px rgba(232, 168, 73, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      }
      #bPlay:hover {
        color: var(--bg);
        box-shadow: 0 2px 14px rgba(232, 168, 73, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      }

      /* Close button subtle danger tint on hover */
      #bClose:hover {
        border-color: rgba(232, 85, 85, 0.3);
        color: #e85555;
      }
    </style>
  </head>
  <body>
    <div class="video-wrap">
      <img id="art" alt="" />
      <video id="v" playsinline></video>
    </div>
    <div class="controls">
      <div class="timeline-row" title="Seek">
        <span class="time" id="tCur">0:00</span>
        <input type="range" id="timeline" min="0" max="0" step="any" value="0" disabled />
        <span class="time" id="tDur">0:00</span>
      </div>
      <div class="bar">
        <button type="button" id="bBack" title="Seek back 10 seconds">&minus;10s</button>
        <button type="button" id="bPlay" title="Play / Pause">Play</button>
        <button type="button" id="bFwd" title="Seek forward 10 seconds">+10s</button>
        <button type="button" id="bClose" title="Close">Close</button>
      </div>
    </div>
    <script>
      ;(function () {
        const SEEK = 10
        const v = document.getElementById('v')
        const timeline = document.getElementById('timeline')
        const tCur = document.getElementById('tCur')
        const tDur = document.getElementById('tDur')
        const bBack = document.getElementById('bBack')
        const bPlay = document.getElementById('bPlay')
        const bFwd = document.getElementById('bFwd')
        const bClose = document.getElementById('bClose')
        const art = document.getElementById('art')
        if (!v || !timeline || !tCur || !tDur || !bBack || !bPlay || !bFwd || !bClose) return

        /** While true, ignore `timeupdate` for slider position (user is scrubbing). */
        var scrubbing = false

        function formatTime(sec) {
          if (!isFinite(sec) || sec < 0) return '0:00'
          var s = Math.floor(sec % 60)
          var m = Math.floor((sec / 60) % 60)
          var h = Math.floor(sec / 3600)
          var pad = function (n) {
            return (n < 10 ? '0' : '') + n
          }
          if (h > 0) return h + ':' + pad(m) + ':' + pad(s)
          return m + ':' + pad(s)
        }

        function durationUsable() {
          var d = v.duration
          return d > 0 && isFinite(d)
        }

        /** Update timeline fill gradient to show progress. */
        function updateTimelineFill() {
          if (!durationUsable()) {
            timeline.style.background = 'var(--border-bright)'
            return
          }
          var pct = (parseFloat(timeline.value) / parseFloat(timeline.max)) * 100
          if (!isFinite(pct)) pct = 0
          timeline.style.background =
            'linear-gradient(to right, var(--accent) ' + pct + '%, var(--border-bright) ' + pct + '%)'
        }

        /** Sync timeline labels + range from `<video>` (skipped during scrub). */
        function refreshTimelineFromVideo() {
          if (scrubbing) return
          var d = v.duration
          var ok = durationUsable()
          timeline.disabled = !ok
          if (ok) {
            timeline.max = String(d)
            timeline.value = String(Math.min(Math.max(0, v.currentTime), d))
          } else {
            timeline.max = '0'
            timeline.value = '0'
          }
          tCur.textContent = formatTime(v.currentTime)
          tDur.textContent = ok ? formatTime(d) : '\u2014'
          updateTimelineFill()
        }

        function beginScrub() {
          if (scrubbing || !durationUsable()) return
          scrubbing = true
          console.log('[floating-player] timeline scrub start', { t: v.currentTime, d: v.duration })
        }

        function endScrub() {
          if (!scrubbing) return
          scrubbing = false
          refreshTimelineFromVideo()
          sendProgressSync(true)
          console.log('[floating-player] timeline scrub end', { t: v.currentTime })
        }

        timeline.addEventListener('pointerdown', function (e) {
          if (timeline.disabled) return
          if (e.pointerType === 'mouse' && e.button !== 0) return
          beginScrub()
          if (!scrubbing) return
          try {
            timeline.setPointerCapture(e.pointerId)
          } catch (err) {
            console.warn('[floating-player] setPointerCapture failed', err)
          }
        })
        timeline.addEventListener('pointerup', function (e) {
          try {
            if (timeline.hasPointerCapture(e.pointerId)) {
              timeline.releasePointerCapture(e.pointerId)
            }
          } catch (err) {
            /* release without capture can throw */
          }
          endScrub()
        })
        timeline.addEventListener('lostpointercapture', function () {
          endScrub()
        })
        timeline.addEventListener('input', function () {
          if (!durationUsable()) return
          var t = parseFloat(timeline.value)
          if (!isFinite(t)) return
          v.currentTime = Math.min(Math.max(0, t), v.duration)
          tCur.textContent = formatTime(v.currentTime)
          updateTimelineFill()
        })
        timeline.addEventListener('change', function () {
          endScrub()
        })
        window.addEventListener('pointercancel', function () {
          endScrub()
        })
        window.addEventListener('pointerup', function () {
          endScrub()
        })

        function updatePlayLabel() {
          bPlay.textContent = v.paused ? 'Play' : 'Pause'
        }

        /** Push timeline to main window (main <video> is frozen while this window plays). */
        var syncThrottleMs = 250
        var lastSyncSent = 0
        function sendProgressSync(force) {
          var now = Date.now()
          if (!force && now - lastSyncSent < syncThrottleMs) return
          lastSyncSent = now
          var dur = v.duration
          window.floatingPlayer.syncProgress({
            currentTime: v.currentTime,
            duration: dur > 0 && !isNaN(dur) ? dur : 0,
            playing: !v.paused
          })
        }

        /** Main window transport bar → this window (Electron IPC). */
        window.floatingPlayer.onControl(function (cmd) {
          console.log('[floating-player] IPC control', cmd)
          if (cmd.action === 'seek') {
            var d = v.duration
            var t = cmd.currentTime
            if (d > 0 && !isNaN(d)) t = Math.max(0, Math.min(d, t))
            else t = Math.max(0, t)
            v.currentTime = t
            refreshTimelineFromVideo()
            updatePlayLabel()
            sendProgressSync(true)
            return
          }
          if (cmd.action === 'play') {
            void v.play().catch(function (e) {
              console.warn('[floating-player] IPC play', e)
            })
            updatePlayLabel()
            sendProgressSync(true)
            return
          }
          if (cmd.action === 'pause') {
            v.pause()
            updatePlayLabel()
            sendProgressSync(true)
            return
          }
          if (cmd.action === 'togglePlay') {
            void (v.paused ? v.play() : v.pause())
            updatePlayLabel()
            refreshTimelineFromVideo()
            sendProgressSync(true)
          }
        })

        window.floatingPlayer.onInit(function (p) {
          console.log('[floating-player] init', {
            urlLen: p.url?.length,
            t: p.currentTime,
            playing: p.playing,
            hasArtwork: Boolean(p.artworkUrl)
          })
          v.volume = typeof p.volume === 'number' ? p.volume : 1
          v.poster = typeof p.artworkUrl === 'string' ? p.artworkUrl : ''

          /** Match main window: show artwork until a real video frame exists. */
          function syncArtworkLayer() {
            if (!art) return
            var url = typeof p.artworkUrl === 'string' ? p.artworkUrl : ''
            if (!url) {
              art.style.display = 'none'
              art.removeAttribute('src')
              v.classList.remove('floating-audio-only')
              return
            }
            var hasVideo = v.videoWidth > 0 && v.videoHeight > 0
            if (hasVideo) {
              art.style.display = 'none'
              v.classList.remove('floating-audio-only')
              console.log('[floating-player] artwork hidden (video track)', {
                videoWidth: v.videoWidth,
                videoHeight: v.videoHeight
              })
            } else {
              if (art.src !== url) art.src = url
              art.style.display = 'block'
              v.classList.add('floating-audio-only')
              console.log('[floating-player] artwork shown (audio-only or pending)', {
                videoWidth: v.videoWidth,
                videoHeight: v.videoHeight
              })
            }
          }

          if (p.artworkUrl && art) {
            art.src = p.artworkUrl
            art.style.display = 'block'
            v.classList.add('floating-audio-only')
          }

          v.src = p.url
          function onMeta() {
            v.removeEventListener('loadedmetadata', onMeta)
            try {
              v.currentTime = Math.min(Math.max(0, p.currentTime), v.duration > 0 ? v.duration : p.currentTime)
            } catch (e) {
              console.warn('[floating-player] seek after metadata', e)
            }
            if (p.playing) void v.play().catch((e) => console.warn('[floating-player] play', e))
            else v.pause()
            updatePlayLabel()
            refreshTimelineFromVideo()
            sendProgressSync(true)
            syncArtworkLayer()
          }
          v.addEventListener('loadedmetadata', onMeta)
          v.addEventListener('resize', syncArtworkLayer)
          v.addEventListener('error', function () {
            const msg = v.error ? 'code ' + v.error.code : 'unknown'
            window.floatingPlayer.error('video error ' + msg)
          })
          v.addEventListener('ended', function () {
            window.floatingPlayer.ended()
          })
          v.addEventListener('timeupdate', function () {
            refreshTimelineFromVideo()
            sendProgressSync(false)
          })
          v.addEventListener('seeked', function () {
            refreshTimelineFromVideo()
            sendProgressSync(true)
          })
          v.addEventListener('durationchange', function () {
            console.log('[floating-player] durationchange', { d: v.duration })
            refreshTimelineFromVideo()
          })
        })

        bBack.onclick = function () {
          v.currentTime = Math.max(0, v.currentTime - SEEK)
          refreshTimelineFromVideo()
          sendProgressSync(true)
        }
        bFwd.onclick = function () {
          var d = v.duration
          if (d > 0 && !isNaN(d)) v.currentTime = Math.min(d, v.currentTime + SEEK)
          else v.currentTime = v.currentTime + SEEK
          refreshTimelineFromVideo()
          sendProgressSync(true)
        }
        bPlay.onclick = function () {
          void (v.paused ? v.play() : v.pause())
          updatePlayLabel()
          sendProgressSync(true)
        }
        bClose.onclick = function () {
          window.floatingPlayer.closing(v.currentTime)
          window.close()
        }

        v.addEventListener('play', function () {
          updatePlayLabel()
          sendProgressSync(true)
        })
        v.addEventListener('pause', function () {
          updatePlayLabel()
          sendProgressSync(true)
        })

        window.addEventListener('beforeunload', function () {
          try {
            window.floatingPlayer.closing(v.currentTime)
          } catch (e) {
            /* ignore */
          }
        })
      })()
    </script>
  </body>
</html>
